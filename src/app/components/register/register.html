<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 font-sans">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100">
    <div>
      <div class="mx-auto w-16 h-16 bg-[#e6f8fe] rounded-full flex items-center justify-center mb-4">
        <span class="material-icons text-[#0eb9f2] text-3xl">person_add</span>
      </div>
      <h2 class="text-center text-3xl font-bold text-gray-900">
        Create an Account
      </h2>
      <p class="mt-2 text-center text-sm text-gray-500 font-medium">
        Join CareConnect to start booking appointments
      </p>
    </div>
    <form class="mt-8 space-y-6" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <div>
          <label for="email-address" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
          <input id="email-address" name="email" type="email" autocomplete="email" required [(ngModel)]="email"
            class="appearance-none relative block w-full px-4 py-3 border border-gray-200 placeholder-gray-400 text-gray-900 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0eb9f2] focus:border-transparent sm:text-sm transition"
            placeholder="name@example.com">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required [(ngModel)]="password"
            class="appearance-none relative block w-full px-4 py-3 border border-gray-200 placeholder-gray-400 text-gray-900 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0eb9f2] focus:border-transparent sm:text-sm transition"
            placeholder="••••••••">
        </div>
      </div>

      @if (error) {
        <div class="text-red-500 text-sm text-center font-medium bg-red-50 p-3 rounded-lg">
          {{ error }}
        </div>
      }

      <div>
        <button type="submit" [disabled]="loading"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-[#0eb9f2] hover:bg-[#0da0d4] shadow-md transition cursor-pointer disabled:opacity-70 disabled:cursor-not-allowed">
          {{ loading ? 'Registering...' : 'Register' }}
        </button>
      </div>

      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white text-gray-500">Or continue with</span>
        </div>
      </div>

      <div>
        <button type="button" (click)="registerWithGoogle()"
          class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-gray-300 rounded-lg shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition cursor-pointer">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5">
          Google
        </button>
      </div>

      <div class="text-center mt-4">
        <p class="text-sm text-gray-600">Already have an account? <a routerLink="/login" class="text-[#0eb9f2] font-semibold hover:underline cursor-pointer">Log in</a></p>
      </div>
    </form>
  </div>
</div>
