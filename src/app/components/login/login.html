<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 font-sans">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100">
    <div>
      <div class="mx-auto w-16 h-16 bg-[#e6f8fe] rounded-full flex items-center justify-center mb-4">
        <span class="material-icons text-[#0eb9f2] text-3xl">health_and_safety</span>
      </div>
      <h2 class="text-center text-3xl font-bold text-gray-900">
        Welcome Back
      </h2>
      <p class="mt-2 text-center text-sm text-gray-500 font-medium">
        Sign in to access your dashboard
      </p>
    </div>
    <form class="mt-8 space-y-6" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <div>
          <label for="email-address" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
          <input id="email-address" name="email" type="email" autocomplete="email" required [(ngModel)]="email"
            class="appearance-none relative block w-full px-4 py-3 border border-gray-200 placeholder-gray-400 text-gray-900 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0eb9f2] focus:border-transparent sm:text-sm transition"
            placeholder="name@example.com">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required [(ngModel)]="password"
            class="appearance-none relative block w-full px-4 py-3 border border-gray-200 placeholder-gray-400 text-gray-900 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0eb9f2] focus:border-transparent sm:text-sm transition"
            placeholder="••••••••">
        </div>
      </div>

      @if (error) {
        <div class="text-red-500 text-sm text-center font-medium bg-red-50 p-3 rounded-lg">
          {{ error }}
        </div>
      }

      <div>
        <button type="submit"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-[#0eb9f2] hover:bg-[#0da0d4] shadow-md transition cursor-pointer">
          Sign in
        </button>
      </div>
    </form>

    <div class="mt-8 pt-6 border-t border-gray-100">
      <p class="text-xs uppercase tracking-wider text-gray-400 font-semibold text-center mb-4">Quick Demo Login</p>
      <div class="grid grid-cols-3 gap-3">
        <button (click)="loginAs('patient')" class="px-2 py-2 border border-gray-200 text-xs font-semibold rounded-lg text-gray-600 bg-white hover:bg-gray-50 hover:border-gray-300 transition cursor-pointer shadow-sm">
          Patient
        </button>
        <button (click)="loginAs('doctor')" class="px-2 py-2 border border-gray-200 text-xs font-semibold rounded-lg text-gray-600 bg-white hover:bg-gray-50 hover:border-gray-300 transition cursor-pointer shadow-sm">
          Doctor
        </button>
        <button (click)="loginAs('admin')" class="px-2 py-2 border border-gray-200 text-xs font-semibold rounded-lg text-gray-600 bg-white hover:bg-gray-50 hover:border-gray-300 transition cursor-pointer shadow-sm">
          Admin
        </button>
      </div>
    </div>
  </div>
</div>
